<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing API - eSoluzion</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        .status { background: #e8f5e9; padding: 15px; border-radius: 8px; margin: 20px 0; }
        a { color: #1976d2; }
    </style>
</head>
<body>
    <h1>🏷️ Pricing API - eSoluzion</h1>
    <div class="status">
        <strong>Backend:</strong> <span id="backend-status">Verificando...</span>
    </div>
    <p>API de consulta de tarifas/precios de productos.</p>
    <ul>
        <li><a href="/api/prices?applicationDate=2020-06-14T10:00:00&productId=35455&brandId=1">Probar endpoint (Test 1)</a></li>
        <li><a href="/swagger-ui.html">Swagger UI</a></li>
        <li><a href="/h2-console">H2 Console</a></li>
    </ul>
    <script>
        fetch('/api/prices?applicationDate=2020-06-14T10:00:00&productId=35455&brandId=1')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(d => document.getElementById('backend-status').textContent = '✅ Operativo (' + d.price + ' EUR)')
            .catch(() => document.getElementById('backend-status').textContent = '❌ No disponible');
    </script>
</body>
</html>
